<!DOCTYPE html>
<html lang="en">

<head>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            width: 800px;
            height: 1131px;
            background: #F0F6E6;
            overflow: hidden;
        }

        /* Standard A4 proportion */
        .global-decor {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 0;
        }
    </style>
</head>

<body>
    <div class="global-decor">
        <svg class="decor-corner decor-tl" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg"
            style="position: absolute; width: 450px; height: 450px; top: -10px; left: -10px;">
            <path d="M0,0 L0,220 Q 180,220 280,0 Z" fill="rgba(160, 201, 105, 0.4)" />
            <path d="M0,0 L0,320 Q 240,320 360,0 Z" fill="rgba(160, 201, 105, 0.2)" />
            <path d="M0,0 L0,400 Q 300,400 450,0 Z" fill="rgba(160, 201, 105, 0.1)" />
            <g transform="translate(150, 40) rotate(45)">
                <rect width="24" height="24" fill="#A0C969" />
            </g>
            <g transform="translate(80, 100) rotate(45)">
                <rect width="36" height="36" fill="#C4E091" />
            </g>
            <g transform="translate(220, 120) rotate(45)">
                <rect width="18" height="18" fill="#E2EFCA" />
            </g>
            <g transform="translate(120, 180) rotate(45)">
                <rect width="20" height="20" fill="#A0C969" opacity="0.6" />
            </g>
            <g transform="translate(50, 250) rotate(45)">
                <rect width="30" height="30" fill="#A0C969" />
            </g>
        </svg>
        <svg class="decor-corner decor-br" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg"
            style="position: absolute; width: 450px; height: 450px; bottom: -10px; right: -10px;">
            <g transform="translate(400, 400) rotate(180)">
                <path d="M0,0 L0,220 Q 180,220 280,0 Z" fill="rgba(160, 201, 105, 0.4)" />
                <path d="M0,0 L0,320 Q 240,320 360,0 Z" fill="rgba(160, 201, 105, 0.2)" />
                <path d="M0,0 L0,400 Q 300,400 450,0 Z" fill="rgba(160, 201, 105, 0.1)" />
                <g transform="translate(150, 40) rotate(45)">
                    <rect width="24" height="24" fill="#A0C969" />
                </g>
                <g transform="translate(80, 100) rotate(45)">
                    <rect width="36" height="36" fill="#C4E091" />
                </g>
                <g transform="translate(220, 120) rotate(45)">
                    <rect width="18" height="18" fill="#E2EFCA" />
                </g>
                <g transform="translate(100, 320) rotate(45)">
                    <rect width="25" height="25" fill="#A0C969" opacity="0.3" />
                </g>
                <g transform="translate(280, 180) rotate(45)">
                    <rect width="16" height="16" fill="#A0C969" opacity="0.7" />
                </g>
            </g>
        </svg>
    </div>
</body>

</html>
